services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
      args:
        PYTHON_VERSION: ${PYTHON_VERSION:-3.14}
    image: odontogroup-marketplace-api:${IMAGE_TAG:-homolog}
    init: true
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1"]
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DB_URL: duckdb:////database/ANS.db
      AIBI_STORAGE_PATH: /app/runtime/aibi_storage.db
      PROMPTS_DIR: /app/prompts
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-*}
      PYTHONUNBUFFERED: "1"
    volumes:
      - type: bind
        source: ${HOST_DUCKDB_PATH:-./data/banco_odontogroup.db}
        target: /database/ANS.db
        read_only: true
      - ./runtime:/app/runtime
    ports:
      - "${API_PORT:-8001}:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    image: odontogroup-marketplace-frontend:${IMAGE_TAG:-homolog}
    depends_on:
      - api
    ports:
      - "${FRONT_PORT:-8081}:80"
    restart: unless-stopped
