<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marketplace Odontogroup - Dashboard (Regional)</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        brand: {
                            50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd',
                            400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8',
                            800: '#1e40af', 900: '#1e3a8a', 950: '#172554',
                        },
                        wine: {
                            50: '#fcf4f5', 100: '#fae6e8', 200: '#f3c7cb', 300: '#eaa2a9',
                            400: '#de727c', 500: '#cd4552', 600: '#b2303c', 700: '#942530',
                            800: '#7c222a', 900: '#682126', 950: '#380f14',
                        }
                    },
                    animation: {
                        'spin-slow': 'spin 8s linear infinite',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            /* slate-50 */
            color: #0f172a;
            margin: 0;
            overflow: hidden;
        }

        /* Active Notch Reverse Corner Radii - Fixed with Radial Gradients */
        .active-notch::before {
            content: "";
            position: absolute;
            right: 0;
            bottom: 100%;
            width: 24px;
            height: 24px;
            background: radial-gradient(circle at top left, transparent 23.5px, #f8fafc 24px);
            pointer-events: none;
        }

        .active-notch::after {
            content: "";
            position: absolute;
            right: 0;
            top: 100%;
            width: 24px;
            height: 24px;
            background: radial-gradient(circle at bottom left, transparent 23.5px, #f8fafc 24px);
            pointer-events: none;
        }

        /* Inactive Item Spotlight Glow (Wine complementary glow from ds.html) */
        .flashlight-btn {
            position: relative;
            overflow: hidden;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .flashlight-btn::after {
            content: "";
            position: absolute;
            inset: -1px;
            background: radial-gradient(100px circle at var(--mouse-x, 0) var(--mouse-y, 0),
                    rgba(148, 37, 48, 0.35),
                    /* Intensified Wine complementary glow */
                    transparent 50%);
            opacity: 0;
            transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
            border-radius: inherit;
            z-index: 0;
        }

        .flashlight-btn>* {
            position: relative;
            z-index: 10;
        }

        .flashlight-btn:hover::after {
            opacity: 1;
        }

        /* Floating Sidebar Ambient Life */
        @keyframes float-sidebar {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        /* Nav Load Stagger Animation (Sync with ds.html) */
        .nav-load {
            opacity: 0;
            transform: translateX(-40px);
            filter: blur(4px);
            transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .nav-load.loaded {
            opacity: 1;
            transform: translateX(0);
            filter: blur(0);
        }

        /* Button Entry Stagger (Reveal pattern from ds.html: translateY(2rem)) */
        .nav-item {
            opacity: 0;
            transform: translateY(2rem);
            transition: all 1.0s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .loaded .nav-item {
            opacity: 1;
            transform: translateY(0);
        }

        /* Pulse slow for active item icon */
        .pulse-icon {
            animation: pulse-slow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse-slow {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.85;
                transform: scale(1.05);
            }
        }

        /* AIBI Hover Float & Glow */
        @keyframes aibi-levitate {

            0%,
            100% {
                transform: translateY(0px);
                filter: drop-shadow(0 0 8px rgba(168, 85, 247, 0.4));
            }

            50% {
                transform: translateY(-4px);
                filter: drop-shadow(0 0 20px rgba(168, 85, 247, 0.8));
            }
        }

        .aibi-levitate {
            animation: aibi-levitate 3.5s ease-in-out infinite;
        }

        /* AIBI Tooltip Entry (ds.html DNA) */
        .aibi-tooltip-entry {
            transform-origin: left center;
            transform: translateX(-30px);
            opacity: 0;
            transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }

        .group:hover .aibi-tooltip-entry {
            transform: translateX(0);
            opacity: 1;
        }

        /* Lettering Mask Reveal (ds.html DNA) */
        .tooltip-text-wrapper {
            overflow: hidden;
            display: inline-block;
            vertical-align: bottom;
        }

        .tooltip-text-content {
            transform: translateY(110%);
            opacity: 0;
            transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1), opacity 1.2s ease;
            display: block;
        }

        .group:hover .tooltip-text-content {
            transform: translateY(0);
            opacity: 1;
        }

        /* Main Content Reveal Animations */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        .delay-100 {
            transition-delay: 100ms;
        }

        .delay-200 {
            transition-delay: 200ms;
        }

        .delay-300 {
            transition-delay: 300ms;
        }

        .delay-400 {
            transition-delay: 400ms;
        }

        /* Custom Scrollbar for Dark Cards */
        .custom-scrollbar::-webkit-scrollbar {
            width: 5px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            margin-block: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        /* Custom Tooltip Styling for Top 5 */
        .map-tooltip-wrapper {
            position: absolute;
            bottom: calc(100% + 15px);
            left: 50%;
            transform: translateX(-50%) translateY(20px) scale(0.9);
            background: linear-gradient(135deg, rgba(37, 30, 51, 0.95) 0%, rgba(20, 15, 28, 0.98) 100%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            border-radius: 20px;
            padding: 20px;
            width: max-content;
            min-width: 340px;
            pointer-events: none;
            opacity: 0;
            z-index: 1000;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            /* Bouncy animation */
            backdrop-filter: blur(12px);
        }

        .map-bubble-wrapper:hover {
            z-index: 1000 !important;
            /* Fix tooltip overlap */
        }

        .map-bubble-wrapper:hover .map-tooltip-wrapper {
            opacity: 1;
            transform: translateX(-50%) translateY(0) scale(1);
        }

        .map-tooltip-wrapper::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -10px;
            border-width: 10px;
            border-style: solid;
            border-color: rgba(37, 30, 51, 0.98) transparent transparent transparent;
        }

        /* Staggered Row Animations in Tooltip */
        .tooltip-row {
            opacity: 0;
            transform: translateX(-15px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .map-bubble-wrapper:hover .tooltip-row {
            opacity: 1;
            transform: translateX(0);
        }

        .map-bubble-wrapper:hover .tooltip-row:nth-child(1) {
            transition-delay: 0.1s;
        }

        .map-bubble-wrapper:hover .tooltip-row:nth-child(2) {
            transition-delay: 0.15s;
        }

        .map-bubble-wrapper:hover .tooltip-row:nth-child(3) {
            transition-delay: 0.2s;
        }

        .map-bubble-wrapper:hover .tooltip-row:nth-child(4) {
            transition-delay: 0.25s;
        }

        .map-bubble-wrapper:hover .tooltip-row:nth-child(5) {
            transition-delay: 0.3s;
        }

        /* Dynamic Tooltip Bar Animations via CSS Variables */
        .tooltip-bar-fill {
            width: 0%;
            transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1);
            /* Bouncy width */
        }

        .map-bubble-wrapper:hover .tooltip-row:nth-child(1) .tooltip-bar-fill {
            transition-delay: 0.15s;
            width: var(--bar-width);
        }

        .map-bubble-wrapper:hover .tooltip-row:nth-child(2) .tooltip-bar-fill {
            transition-delay: 0.20s;
            width: var(--bar-width);
        }

        .map-bubble-wrapper:hover .tooltip-row:nth-child(3) .tooltip-bar-fill {
            transition-delay: 0.25s;
            width: var(--bar-width);
        }

        .map-bubble-wrapper:hover .tooltip-row:nth-child(4) .tooltip-bar-fill {
            transition-delay: 0.30s;
            width: var(--bar-width);
        }

        .map-bubble-wrapper:hover .tooltip-row:nth-child(5) .tooltip-bar-fill {
            transition-delay: 0.35s;
            width: var(--bar-width);
        }

        /* ===== Map Bubble System ===== */
        .map-bubble-wrapper {
            position: absolute;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            z-index: 500 !important;
            cursor: pointer;
        }

        .map-bubble {
            position: absolute;
            border-radius: 50%;
            background: var(--bubble-bg);
            box-shadow: 0 0 20px var(--bubble-glow);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .map-bubble:hover {
            transform: scale(1.3);
            z-index: 600;
        }

        .map-bubble-ping {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            opacity: 0.6;
            animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite;
        }

        .map-bubble-label {
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 8px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.9), 0 0 10px rgba(0, 0, 0, 0.6);
            z-index: 10;
            text-align: center;
        }

        /* Override Leaflet Background */
        .leaflet-container {
            background: transparent !important;
        }
    </style>
</head>

    </main>

    <script>
        const API_BASE = window.API_BASE_URL || (window.location.protocol === 'file:' ? 'http://127.0.0.1:8000' : '');

        // Estado global para os filtros cruzados (Cross-Filtering)
        let activeFilters = {
            uf: null,
            operadora: null,
            regiao: null,
            municipio: null
        };

        function getQueryString() {
            const params = new URLSearchParams();
            if (activeFilters.uf) params.append('uf', activeFilters.uf);
            if (activeFilters.operadora) params.append('operadora', activeFilters.operadora);
            if (activeFilters.regiao) params.append('regiao', activeFilters.regiao);
            if (activeFilters.municipio) params.append('municipio', activeFilters.municipio);
            const qs = params.toString();
            return qs ? `?${qs}` : '';
        }

        // Trigger animations when DOM is loaded
        document.addEventListener("DOMContentLoaded", () => {
            // Sidebar and active elements animation
            setTimeout(() => {
                document.querySelector('.nav-load').classList.add('loaded');
                document.body.classList.add('loaded');
            }, 100);

            // Cascade reveal animation
            const elements = document.querySelectorAll('.reveal');
            elements.forEach((el, index) => {
                setTimeout(() => {
                    el.classList.add('active');
                }, 150 + (index * 100)); // Stagger delay 100ms
            });

            // Carrega a primeira KPI
            loadRankingUF();
        });

        // Flashlight effect for inactive buttons
        function handleMouseMove(e, element) {
            const rect = element.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            element.style.setProperty("--mouse-x", `${x}px`);
            element.style.setProperty("--mouse-y", `${y}px`);
        }

        // Formata número
        function formatNumber(n) {
            return Number(n).toLocaleString('pt-BR');
        }

        // Fetch Ranking UF
        async function loadRankingUF() {
            try {
                // Requisição na API (agora com filtros integrados)
                const response = await fetch(`${API_BASE}/api/dashboard/beneficiarios-uf${getQueryString()}`);
                const data = await response.json();

                const container = document.getElementById('ranking-uf-container');
                container.innerHTML = '';

                if (!data || data.length === 0) {
                    container.innerHTML = '<div class="text-white/50 text-sm mt-10 text-center font-light">Nenhum dado encontrado.</div>';
                    return;
                }

                const maxVal = Math.max(...data.map(d => d.total_beneficiarios));

                data.forEach((item, index) => {
                    const uf = item.uf ? item.uf : '--';
                    const val = item.total_beneficiarios;
                    const pct = maxVal > 0 ? (val / maxVal) * 100 : 0;

                    const isOdontoFiltered = activeFilters.operadora && activeFilters.operadora.toUpperCase().includes("ODONTOGROUP");
                    const hasOperadoraFilter = activeFilters.operadora && activeFilters.operadora !== "Todos";

                    let compBadge = '';
                    if (hasOperadoraFilter && !isOdontoFiltered && item.odontogroup_beneficiarios > 0) {
                        const isPositive = item.diferenca_percentual >= 0;
                        const colorClass = isPositive ? 'text-green-400' : 'text-red-400';
                        const absDiff = Math.abs(item.diferenca_absoluta);
                        compBadge = `<span class="absolute -bottom-4 right-0 text-[9px] font-bold ${colorClass} opacity-0 group-hover:opacity-100 transition-opacity bg-[#251e33] px-1.5 rounded shadow-md z-20 border border-white/10 whitespace-nowrap flex items-center gap-1"><iconify-icon icon="${isPositive ? 'solar:alt-arrow-up-bold' : 'solar:alt-arrow-down-bold'}"></iconify-icon> ${formatNumber(absDiff)} vidas vs ODONTOGROUP</span>`;
                    }

                    const row = document.createElement('div');

                    const isRowActive = activeFilters.uf === uf;
                    const isOtherActive = activeFilters.uf && !isRowActive;
                    let baseClass = 'flex items-center gap-4 mb-3 group cursor-pointer transition-all duration-300 rounded-md p-1 hover:bg-white/10';

                    if (isRowActive) {
                        baseClass += ' bg-white/10 ring-1 ring-wine-500/50';
                    } else if (isOtherActive) {
                        baseClass += ' opacity-40 hover:opacity-100';
                    }

                    row.className = baseClass;

                    // Estrutura padronizada: Sem trilha (bg-white/5 interno), texto sempre fora, gradiente padrão
                    row.innerHTML = `
                        <div class="w-9 shrink-0 text-right text-[11px] font-bold uppercase tracking-wide truncate transition-colors duration-300 text-slate-300 group-hover:text-white">${uf}</div>
                        <div class="flex-1 flex items-center relative h-5">
                            <!-- Barra Padrão Operadoras -->
                            <div class="bar-fill absolute left-0 top-0 h-full rounded-r-[6px] rounded-l-[2px] bg-gradient-to-r from-wine-600/80 to-wine-400/90 shadow-[0_0_8px_rgba(178,48,60,0.2)] transition-all duration-1000 ease-out group-hover:brightness-125" style="width: 0%;"></div>
                            <!-- Texto Padrão (Sempre fora) -->
                            <span class="relative z-10 w-full text-right pr-2 text-[12px] font-semibold transition-colors duration-300 text-slate-200 group-hover:text-white whitespace-nowrap drop-shadow-md">${formatNumber(val)}</span>
                            ${compBadge}
                        </div>
                    `;
                    container.appendChild(row);

                    row.addEventListener('click', () => {
                        activeFilters.uf = activeFilters.uf === uf ? null : uf;
                        updateDashboard();
                    });

                    // Animação Simples e Direta
                    setTimeout(() => {
                        const bar = row.querySelector('.bar-fill');
                        const finalPct = Math.max(pct, 0.5); // mínimo visual
                        bar.style.width = finalPct + '%';
                    }, 50 + (index * 40));
                });

            } catch (error) {
                console.error("Erro ao buscar ranking por UF:", error);
                document.getElementById('ranking-uf-container').innerHTML = '<p class="text-sm text-slate-400 text-center mt-10">Erro ao carregar dados.</p>';
            }
        }

        // Fetch Filtro Operadoras
        async function loadFiltroOperadoras() {
            try {
                const response = await fetch(`${API_BASE}/api/dashboard/filtros-operadoras${getQueryString()}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const operadoras = await response.json();

                const select = document.getElementById('filtro-operadora');
                select.innerHTML = '<option value="Todos" class="bg-[#251e33] text-slate-200">Selecione uma Operadora</option>';

                operadoras.forEach(op => {
                    const option = document.createElement('option');
                    option.value = op;
                    option.textContent = op;
                    option.className = "bg-[#3a314f] text-white";
                    if (activeFilters.operadora === op) {
                        option.selected = true;
                    }
                    select.appendChild(option);
                });

                select.addEventListener('change', (e) => {
                    activeFilters.operadora = e.target.value || null;
                    updateDashboard();
                });

            } catch (error) {
                console.error("Erro ao buscar operadoras:", error);
            }
        }

        // Fetch Ranking Município
        async function loadRankingMunicipio() {
            try {
                const container = document.getElementById('ranking-mun-container');
                const response = await fetch(`${API_BASE}/api/dashboard/ranking-municipio${getQueryString()}`);
                if (!response.ok) {
                    if (response.status === 404) {
                        console.warn("API de municípios não encontrada, usando mock visual");
                        const mockData = [
                            { municipio: "SÃO PAULO", total_beneficiarios: 4232725 },
                            { municipio: "RIO DE JANEIRO", total_beneficiarios: 2474716 },
                            { municipio: "FORTALEZA", total_beneficiarios: 1039138 },
                            { municipio: "SALVADOR", total_beneficiarios: 921284 },
                            { municipio: "CURITIBA", total_beneficiarios: 821783 },
                            { municipio: "BRASÍLIA", total_beneficiarios: 758622 },
                        ];
                        renderRankingMunicipio(mockData, container);
                        return;
                    }
                    throw new Error(`HTTP ${response.status}`);
                }
                const data = await response.json();
                renderRankingMunicipio(data, container);
            } catch (error) {
                console.error("Erro ao buscar ranking município:", error);
                document.getElementById('ranking-mun-container').innerHTML = '<p class="text-sm text-slate-400 text-center mt-10">Erro ao carregar dados.</p>';
            }
        }

        function renderRankingMunicipio(data, container) {
            container.innerHTML = '';
            if (data.length === 0) {
                container.innerHTML = '<p class="text-sm text-slate-400 text-center mt-10">Nenhum dado encontrado.</p>';
                return;
            }

            const maxVal = Math.max(...data.map(d => d.total_beneficiarios));

            data.forEach((item, index) => {
                const mun = item.municipio ? item.municipio : '--';
                const val = item.total_beneficiarios;
                const pct = maxVal > 0 ? (val / maxVal) * 100 : 0;

                const isOdontoFiltered = activeFilters.operadora && activeFilters.operadora.toUpperCase().includes("ODONTOGROUP");
                const hasOperadoraFilter = activeFilters.operadora && activeFilters.operadora !== "Todos";

                let compBadge = '';
                if (hasOperadoraFilter && !isOdontoFiltered && item.odontogroup_beneficiarios > 0) {
                    const isPositive = item.diferenca_percentual >= 0;
                    const colorClass = isPositive ? 'text-green-400' : 'text-red-400';
                    const absDiff = Math.abs(item.diferenca_absoluta);
                    compBadge = `<span class="absolute -bottom-4 right-0 text-[9px] font-bold ${colorClass} opacity-0 group-hover:opacity-100 transition-opacity bg-[#251e33] px-1.5 rounded shadow-md z-20 border border-white/10 whitespace-nowrap flex items-center gap-1"><iconify-icon icon="${isPositive ? 'solar:alt-arrow-up-bold' : 'solar:alt-arrow-down-bold'}"></iconify-icon> ${formatNumber(absDiff)} vidas vs ODONTOGROUP</span>`;
                }

                const row = document.createElement('div');

                const isRowActive = activeFilters.municipio === mun;
                const isOtherActive = activeFilters.municipio && !isRowActive;
                let baseClass = 'flex items-center gap-4 mb-3 group cursor-pointer transition-all duration-300 rounded-md p-1 hover:bg-white/10 border-b border-white/5 pb-2 shrink-0';

                if (isRowActive) {
                    baseClass += ' bg-white/10 ring-1 ring-brand-500/50';
                } else if (isOtherActive) {
                    baseClass += ' opacity-40 hover:opacity-100';
                }

                row.className = baseClass;

                row.innerHTML = `
                    <div class="w-24 shrink-0 text-left text-[11px] font-bold uppercase tracking-wide truncate transition-colors duration-300 text-slate-300 group-hover:text-white" title="${mun}">${mun}</div>
                    <div class="flex-1 flex items-center relative h-5 bg-white/5 rounded-[4px] border border-white/10 overflow-visible">
                        <div class="bar-fill absolute top-0 left-0 h-full rounded-[3px] bg-gradient-to-r from-brand-600/80 to-brand-400/90 shadow-[0_0_8px_rgba(37,99,235,0.2)] transition-all duration-1000 ease-out group-hover:brightness-125" style="width: 0%;"></div>
                        <span class="relative z-10 w-full text-right pr-2 text-[11px] font-bold text-white/90 drop-shadow-md">${formatNumber(val)}</span>
                        ${compBadge}
                    </div>
                `;
                container.appendChild(row);

                row.addEventListener('click', () => {
                    activeFilters.municipio = activeFilters.municipio === mun ? null : mun;
                    updateDashboard();
                });

                setTimeout(() => {
                    const bar = row.querySelector('.bar-fill');
                    const finalPct = Math.max(pct, 0.5);
                    bar.style.width = finalPct + '%';
                }, 50 + (index * 40));
            });
        }

        // Coordenadas das Regiões
        const REGIAO_COORDS = {
            'NORTE': [-4.00, -60.00],
            'NORDESTE': [-6.00, -39.00],
            'CENTRO-OESTE': [-15.00, -53.00],
            'SUDESTE': [-21.00, -44.00],
            'SUL': [-27.00, -52.00]
        };

        function getBubbleStyle(total) {
            if (total >= 1000000) {
                return { bg: '#c084fc', glow: 'rgba(192,132,252,0.4)', size: Math.min(60, 36 + (total / 1000000) * 8), label: true, pulse: true };
            } else if (total >= 150000) {
                return { bg: '#de727c', glow: 'rgba(222,114,124,0.35)', size: Math.min(46, 24 + (total / 200000) * 4), label: true, pulse: false };
            } else {
                return { bg: '#60a5fa', glow: 'rgba(96,165,250,0.3)', size: Math.max(18, 14 + (total / 50000) * 4), label: true, pulse: false };
            }
        }

        let mapInstance = null;
        let layerGroup = null;

        async function loadMapaBeneficiarios() {
            if (!mapInstance) {
                mapInstance = L.map('mapa-uf', {
                    center: [-14.24, -51.93],
                    zoom: 4,
                    zoomControl: true,
                    attributionControl: false,
                    scrollWheelZoom: true,
                    dragging: true,
                    doubleClickZoom: true
                });

                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
                    subdomains: 'abcd',
                    maxZoom: 19
                }).addTo(mapInstance);

                layerGroup = L.layerGroup().addTo(mapInstance);
            }

            try {
                const res = await fetch(`${API_BASE}/api/dashboard/beneficiarios-regiao${getQueryString()}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const dados = await res.json();

                layerGroup.clearLayers();

                dados.forEach((item, i) => {
                    const regiaoStr = item.regiao ? item.regiao.toUpperCase() : '';
                    const coords = REGIAO_COORDS[regiaoStr];
                    if (!coords) return;

                    const s = getBubbleStyle(item.total_beneficiarios);

                    // Gerar HTML do Tooltip (Top 5)
                    let tooltipHTML = '';
                    if (item.top_operadoras && item.top_operadoras.length > 0) {
                        const topOps = item.top_operadoras.slice(0, 5);
                        const maxOpVal = Math.max(...topOps.map(o => o.beneficiarios));

                        let rowsHTML = '';
                        topOps.forEach(op => {
                            const pct = maxOpVal > 0 ? (op.beneficiarios / maxOpVal) * 100 : 0;

                            let badgeHTML = '';
                            if (!op.nome.toUpperCase().includes('ODONTOGROUP')) {
                                const diff = op.diferenca_odonto;
                                const isPositive = diff >= 0;
                                const colorClass = isPositive ? 'text-green-400' : 'text-red-400';
                                const absDiff = Math.abs(diff);
                                const badgeIcon = isPositive ? 'solar:alt-arrow-up-bold' : 'solar:alt-arrow-down-bold';
                                const suffix = isPositive ? 'a mais' : 'a menos';

                                badgeHTML = `
                                    <div class="flex items-center justify-end gap-1 mt-0.5 opacity-90">
                                        <iconify-icon icon="${badgeIcon}" class="${colorClass} text-[9px]"></iconify-icon>
                                        <span class="text-[9px] font-bold ${colorClass}">${isPositive ? '+' : '-'}<span class="count-up-diff" data-val="${absDiff}">0</span> ${suffix}</span>
                                    </div>
                                `;
                            } else {
                                badgeHTML = `
                                    <div class="flex items-center justify-end gap-1 mt-0.5">
                                        <span class="text-[8px] font-bold text-yellow-500 uppercase tracking-widest bg-yellow-500/10 px-1.5 py-0.5 rounded">REFERÊNCIA</span>
                                    </div>
                                `;
                            }

                            rowsHTML += `
                                <div class="tooltip-row flex items-center gap-3 mb-3 last:mb-0">
                                    <span class="w-[85px] text-[10px] text-right font-extrabold text-slate-300 truncate uppercase tracking-wide" title="${op.nome}">${op.nome}</span>
                                    <div class="flex-1 h-[22px] bg-white/5 rounded-sm relative overflow-hidden shadow-inner shadow-black/20">
                                        <div class="tooltip-bar-fill absolute top-0 left-0 h-full bg-gradient-to-r from-wine-600/80 to-wine-400/90 rounded-sm shadow-[0_0_8px_rgba(178,48,60,0.4)] overflow-hidden" style="--bar-width: ${Math.max(pct, 1)}%;">
                                            <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full animate-shimmer"></div>
                                        </div>
                                    </div>
                                    <div class="w-[100px] shrink-0 flex flex-col justify-center text-right leading-tight">
                                        <span class="text-[12px] font-extrabold text-white drop-shadow-md tracking-wide count-up-main" data-val="${op.beneficiarios}">0</span>
                                        ${badgeHTML}
                                    </div>
                                </div>
                            `;
                        });

                        tooltipHTML = `
                            <div class="map-tooltip-wrapper">
                                <div class="flex items-center gap-2 mb-4 border-b border-white/10 pb-3">
                                    <div class="w-8 h-8 rounded bg-white/5 flex items-center justify-center border border-white/10 shadow-inner shadow-white/5">
                                        <iconify-icon icon="solar:chart-square-bold-duotone" class="text-white text-lg"></iconify-icon>
                                    </div>
                                    <h4 class="text-white text-[12px] font-extrabold tracking-widest uppercase">Top 5 - ${regiaoStr}</h4>
                                </div>
                                <div class="flex flex-col">
                                    ${rowsHTML}
                                </div>
                            </div>
                        `;
                    }

                    const html = `
                        ${tooltipHTML}
                        <div class="map-bubble" style="width:${s.size}px; height:${s.size}px; --bubble-bg:${s.bg}; --bubble-glow:${s.glow}; animation-delay:${i * 80}ms;">
                            ${s.pulse ? `<span class="map-bubble-ping" style="background:${s.bg};"></span>` : ''}
                            ${s.label ? `<span class="map-bubble-label">${regiaoStr}</span>` : ''}
                        </div>
                    `;

                    const isRegionActive = activeFilters.regiao === regiaoStr;
                    const isOtherRegionActive = activeFilters.regiao && !isRegionActive;
                    let extraClasses = '';
                    if (isRegionActive) extraClasses = ' ring-[3px] ring-white/70 scale-110 drop-shadow-[0_0_15px_rgba(255,255,255,0.4)] z-50 transition-all duration-300 rounded-full cursor-pointer';
                    else if (isOtherRegionActive) extraClasses = ' opacity-20 transition-all duration-300 cursor-pointer';
                    else extraClasses = ' cursor-pointer transition-all duration-300';

                    const icon = L.divIcon({
                        html: html,
                        className: `map-bubble-wrapper${extraClasses}`,
                        iconSize: [s.size + 8, s.size + 8],
                        iconAnchor: [(s.size + 8) / 2, (s.size + 8) / 2]
                    });

                    const marker = L.marker(coords, { icon: icon }).addTo(layerGroup);

                    // Cross-Filter de Região
                    marker.on('click', () => {
                        activeFilters.regiao = activeFilters.regiao === regiaoStr ? null : regiaoStr;
                        updateDashboard();
                    });

                    // Animação Inteligente (Count-Up)
                    marker.on('mouseover', function (e) {
                        this.setZIndexOffset(10000);
                        const el = this.getElement();
                        if (el && !el.dataset.animated) {
                            el.dataset.animated = 'true';

                            // Função para animar qualquer contador
                            const animateCounters = (selector, durationBase) => {
                                const counters = el.querySelectorAll(selector);
                                counters.forEach((counter, idx) => {
                                    const target = +counter.getAttribute('data-val');
                                    if (!target) return;

                                    // Stagger delay baseado no index
                                    setTimeout(() => {
                                        const duration = durationBase;
                                        const startTime = performance.now();

                                        const update = (currentTime) => {
                                            const elapsed = currentTime - startTime;
                                            const progress = Math.min(elapsed / duration, 1);
                                            // Easing easeOutExpo
                                            const ease = progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress);

                                            const current = target * ease;
                                            counter.innerText = Math.floor(current).toLocaleString('pt-BR');

                                            if (progress < 1) {
                                                requestAnimationFrame(update);
                                            } else {
                                                counter.innerText = target.toLocaleString('pt-BR');
                                            }
                                        };
                                        requestAnimationFrame(update);
                                    }, idx * 50); // 50ms stagger
                                });
                            };

                            animateCounters('.count-up-main', 1000);
                            animateCounters('.count-up-diff', 1000);
                        }
                    });

                    marker.on('mouseout', function (e) {
                        this.setZIndexOffset(0);
                        const el = this.getElement();
                        if (el) {
                            el.dataset.animated = ''; // Reset para re-animar no próximo hover
                            el.querySelectorAll('.count-up-main, .count-up-diff').forEach(c => c.innerText = "0");
                        }
                    });
                });

            } catch (err) {
                console.error('Erro ao carregar mapa:', err);
            }
        }

        // Update Dashboard calls
        function updateDashboard() {
            loadRankingUF();
            loadRankingMunicipio();
            loadMapaBeneficiarios();
            updateClearButton();
            syncSelect();
        }

        function clearFilters() {
            activeFilters = { uf: null, operadora: null, regiao: null, municipio: null };
            updateDashboard();
        }

        function updateClearButton() {
            let btn = document.getElementById('btn-limpar-filtros');
            const hasFilters = activeFilters.uf || (activeFilters.operadora && activeFilters.operadora !== "Todos") || activeFilters.regiao || activeFilters.municipio;

            if (hasFilters) {
                if (!btn) {
                    btn = document.createElement('button');
                    btn.id = 'btn-limpar-filtros';
                    btn.className = 'absolute top-4 right-4 bg-wine-600 hover:bg-wine-500 text-white text-xs px-3 py-1.5 rounded-full shadow-lg transition-all z-50 flex items-center gap-1';
                    btn.innerHTML = '<iconify-icon icon="solar:close-circle-bold"></iconify-icon> Limpar Filtros';
                    btn.onclick = clearFilters;
                    document.body.appendChild(btn);
                }
                btn.style.opacity = '1';
            } else {
                if (btn) btn.style.opacity = '0';
            }
        }

        function syncSelect() {
            const select = document.getElementById('filtro-operadora');
            if (select) {
                select.value = activeFilters.operadora || "Todos";
            }
        }

        // Inicialização
        document.addEventListener('DOMContentLoaded', () => {
            loadRankingUF();
            loadFiltroOperadoras();
            loadRankingMunicipio();
            loadMapaBeneficiarios();
        });
    </script>
</body>

</html>
