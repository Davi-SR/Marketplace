<head>

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa',
                            500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a', 950: '#172554',
                        },
                        wine: {
                            50: '#fcf4f5', 100: '#fae6e8', 200: '#f3c7cb', 300: '#eaa2a9', 400: '#de727c',
                            500: '#cd4552', 600: '#b2303c', 700: '#942530', 800: '#7c222a', 900: '#682126', 950: '#380f14',
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'levitate': 'aibi-levitate 3.5s ease-in-out infinite',
                        'gradient-x': 'gradient-x 4s ease infinite',
                        'spin-slow': 'spin 8s linear infinite',
                    },
                    keyframes: {
                        'aibi-levitate': {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-8px)' }
                        },
                        'gradient-x': {
                            '0%, 100%': { 'background-size': '200% 200%', 'background-position': 'left center' },
                            '50%': { 'background-size': '200% 200%', 'background-position': 'right center' }
                        },
                        'fade-in-up': {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            /* slate-950 */
            color: #f8fafc;
            overflow: hidden;
        }

        /* ds.html Animations & Utilities */
        .reveal {
            opacity: 0;
            transform: translateY(20px);
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Masked Text Reveal (from ds.html) */
        .text-reveal-wrapper {
            overflow: hidden;
            display: inline-block;
            vertical-align: bottom;
        }

        .text-reveal-content {
            transform: translateY(110%);
            opacity: 0;
            transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1), opacity 1.2s ease;
            display: block;
        }

        .reveal-active .text-reveal-content {
            transform: translateY(0);
            opacity: 1;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        .welcome-leave {
            opacity: 0;
            transform: scale(0.95) translateY(-30px);
            filter: blur(10px);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
            position: absolute;
            left: 0;
            right: 0;
            z-index: 0;
        }

        .delay-100 {
            transition-delay: 0.1s;
        }

        .delay-200 {
            transition-delay: 0.2s;
        }

        .delay-300 {
            transition-delay: 0.3s;
        }

        /* Custom scrollbar from ds.html */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        /* ds.html Flashlight Effect adapted for Dark Mode */
        .flashlight-card {
            position: relative;
            background: #1e293b;
            isolation: isolate;
            overflow: hidden;
        }

        .flashlight-card::before {
            content: "";
            position: absolute;
            inset: 0px;
            background: radial-gradient(400px circle at var(--mouse-x) var(--mouse-y), rgba(37, 99, 235, 0.15), transparent 40%);
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
            z-index: -1;
            border-radius: inherit;
        }

        .flashlight-card.wine-glow::before {
            background: radial-gradient(400px circle at var(--mouse-x) var(--mouse-y), rgba(178, 48, 60, 0.15), transparent 40%);
        }

        .flashlight-card:hover::before {
            opacity: 1;
        }

        /* Markdown Styles */
        .markdown-body > *:first-child {
            margin-top: 0 !important;
        }
        .markdown-body > *:last-child {
            margin-bottom: 0 !important;
        }
        .markdown-body h1,
        .markdown-body h2,
        .markdown-body h3 {
            font-weight: 600;
            margin-top: 1.5em;
            margin-bottom: 0.75em;
            color: #f8fafc;
            tracking: tight;
        }

        .markdown-body h1 {
            font-size: 1.5em;
        }

        .markdown-body h2 {
            font-size: 1.25em;
        }

        .markdown-body p {
            margin-bottom: 1.25em;
            line-height: 1.7;
            color: #cbd5e1;
        }

        .markdown-body ul,
        .markdown-body ol {
            margin-bottom: 1.25em;
            padding-left: 1.5em;
            color: #cbd5e1;
        }

        .markdown-body ul {
            list-style-type: disc;
        }

        .markdown-body ol {
            list-style-type: decimal;
        }

        .markdown-body li {
            margin-bottom: 0.5em;
        }

        .markdown-body strong {
            font-weight: 600;
            color: #f8fafc;
        }

        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1.5em;
            font-size: 0.875rem;
        }

        .markdown-body th,
        .markdown-body td {
            border: 1px solid #334155;
            padding: 0.75rem 1rem;
            text-align: left;
        }

        .markdown-body th {
            background-color: #0f172a;
            font-weight: 600;
            color: #f8fafc;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.75rem;
        }

        /* Code block styling */
        .markdown-body pre {
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            padding: 1rem;
            overflow-x: auto;
            margin-bottom: 1.5em;
        }

        .markdown-body code {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 0.875rem;
            color: #38bdf8;
        }

        .markdown-body pre code {
            color: #e2e8f0;
            background-color: transparent;
            border: none;
            padding: 0;
        }

        .aibi-chart-shell {
            width: 100%;
            max-width: 100%;
            max-height: min(640px, 72vh);
            overflow-x: scroll;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
            touch-action: pan-x pan-y;
            cursor: grab;
            margin: 1.5rem 0;
            padding: 1rem;
            border: 1px solid rgba(51, 65, 85, 0.7);
            border-radius: 1rem;
            background: rgba(15, 23, 42, 0.58);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.03), 0 18px 40px rgba(0,0,0,0.22);
            scrollbar-gutter: stable both-edges;
            scrollbar-width: thin;
            scrollbar-color: rgba(96, 165, 250, 0.8) rgba(255,255,255,0.08);
        }

        .aibi-chart-shell.is-dragging {
            cursor: grabbing;
            user-select: none;
        }

        .aibi-chart-shell::after {
            content: '';
            position: sticky;
            right: -1rem;
            top: 0;
            float: right;
            width: 34px;
            height: 100%;
            min-height: 240px;
            margin-left: -34px;
            pointer-events: none;
            background: linear-gradient(90deg, transparent, rgba(15, 23, 42, 0.82));
            border-radius: 0 1rem 1rem 0;
            z-index: 5;
        }

        .aibi-chart-shell::-webkit-scrollbar {
            height: 8px;
        }

        .aibi-chart-shell::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.08);
            border-radius: 999px;
        }

        .aibi-chart-shell::-webkit-scrollbar-thumb {
            background: linear-gradient(90deg, rgba(59,130,246,0.95), rgba(178,48,60,0.95));
            border-radius: 999px;
        }

        .aibi-chart-canvas {
            width: 760px;
            min-width: 760px;
            max-width: none;
        }

        /* Thinking animation dots */
        .typing-dot {
            width: 6px;
            height: 6px;
            background-color: #60a5fa;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Beautiful AI Response Staggered Animations */
        @keyframes fade-in-up {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .stagger-message > * {
            animation: fade-in-up 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }
        
        .stagger-message > *:nth-child(1) { animation-delay: 0.1s; }
        .stagger-message > *:nth-child(2) { animation-delay: 0.25s; }
        .stagger-message > *:nth-child(3) { animation-delay: 0.4s; }
        .stagger-message > *:nth-child(4) { animation-delay: 0.55s; }
        .stagger-message > *:nth-child(5) { animation-delay: 0.7s; }
        .stagger-message > *:nth-child(6) { animation-delay: 0.85s; }
        .stagger-message > *:nth-child(7) { animation-delay: 1.0s; }
        .stagger-message > *:nth-child(n+8) { animation-delay: 1.1s; }

        /* Auto-resize textarea */
        textarea {
            resize: none;
            overflow: hidden;
            min-height: 44px;
            max-height: 200px;
        }
    </style>

    <style>
        /* Responsive chat overrides */
        * {
            min-width: 0;
        }

        .markdown-body,
        #chat-container {
            overflow-wrap: anywhere;
        }

        .suggestion-carousel {
            width: 100%;
            position: relative;
        }

        .suggestion-track {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            overscroll-behavior-x: contain;
            scroll-behavior: smooth;
            scroll-snap-type: x mandatory;
            padding: 4px 2px 18px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            scrollbar-color: rgba(59, 130, 246, 0.85) rgba(255, 255, 255, 0.08);
        }

        .suggestion-track::-webkit-scrollbar {
            height: 8px;
        }

        .suggestion-track::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 999px;
        }

        .suggestion-track::-webkit-scrollbar-thumb {
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.95), rgba(148, 37, 48, 0.95));
            border-radius: 999px;
        }

        .suggestion-card {
            flex: 0 0 min(320px, 82vw);
            scroll-snap-align: start;
            text-align: left;
            font: inherit;
            appearance: none;
        }

        .suggestion-card:focus-visible {
            outline: 2px solid rgba(96, 165, 250, 0.85);
            outline-offset: 4px;
        }

        .suggestion-nav-btn {
            width: 38px;
            height: 38px;
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: rgb(148 163 184);
            background: rgba(15, 23, 42, 0.72);
            border: 1px solid rgba(51, 65, 85, 0.8);
            transition: all 220ms ease;
        }

        .suggestion-nav-btn:hover {
            color: #fff;
            border-color: rgba(59, 130, 246, 0.45);
            background: rgba(37, 99, 235, 0.18);
            box-shadow: 0 0 18px rgba(59, 130, 246, 0.14);
        }

        .suggestion-dot {
            width: 7px;
            height: 7px;
            border-radius: 999px;
            background: rgba(100, 116, 139, 0.45);
            transition: all 220ms ease;
        }

        .suggestion-dot.active {
            width: 22px;
            background: linear-gradient(90deg, #60a5fa, #de727c);
            box-shadow: 0 0 14px rgba(96, 165, 250, 0.35);
        }

        @media (min-width: 768px) {
            .suggestion-card {
                flex-basis: calc((100% - 32px) / 3);
                min-width: 250px;
            }
        }

        @media (max-width: 760px) {
            html,
            body {
                height: auto !important;
                min-height: 100%;
                overflow-x: hidden;
            }

            body > header {
                padding: 12px 14px !important;
                gap: 10px !important;
            }

            body > header a {
                padding: 10px 12px !important;
            }

            body > header a span {
                display: none !important;
            }

            body > header > div:last-child {
                display: none !important;
            }

            body > header h1 {
                font-size: 11px !important;
                letter-spacing: 0.08em !important;
            }

            #chat-container {
                max-width: 100% !important;
                padding: 88px 14px 180px !important;
                gap: 20px !important;
            }

            #welcome-screen {
                min-height: auto !important;
                margin-top: 12px !important;
            }

            #welcome-screen h2 {
                font-size: clamp(1.75rem, 9vw, 2.4rem) !important;
                line-height: 1.08 !important;
            }

            #welcome-screen p {
                font-size: 0.95rem !important;
            }

            .flashlight-card {
                min-height: auto !important;
            }

            .suggestion-track {
                gap: 12px;
                padding-bottom: 14px;
            }

            .suggestion-card {
                flex-basis: min(286px, 84vw);
            }

            .suggestion-nav-btn {
                width: 34px;
                height: 34px;
                border-radius: 12px;
            }

            #chat-container [class*="max-w-[85%]"] {
                max-width: 92% !important;
            }

            #chat-container .flex.gap-4.w-full.max-w-4xl.group {
                gap: 10px !important;
            }

            .markdown-body table,
            .markdown-body pre {
                display: block;
                max-width: 100%;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            .aibi-chart-shell {
                padding: 0.75rem;
                margin: 1.25rem 0;
            }

            .aibi-chart-canvas {
                width: 760px;
                min-width: 760px;
            }

            body > div.fixed.bottom-0 {
                padding: 72px 12px 16px !important;
            }

            #chat-form {
                align-items: flex-end !important;
                gap: 8px !important;
                padding: 8px 8px 8px 14px !important;
            }

            #chat-input {
                min-height: 44px !important;
                font-size: 16px !important;
            }

            #send-btn {
                width: 44px !important;
                height: 44px !important;
                border-radius: 16px !important;
            }
        }

        @media (max-width: 420px) {
            body > header {
                padding-inline: 10px !important;
            }

            body > header .flex.items-center.gap-3 {
                gap: 8px !important;
            }

            #chat-container {
                padding-inline: 10px !important;
                padding-bottom: 170px !important;
            }

            body > div.fixed.bottom-0 {
                padding-inline: 8px !important;
            }

            #chat-form {
                padding-left: 12px !important;
            }
        }

        @media (max-height: 560px) and (orientation: landscape) {
            #chat-container {
                padding-top: 76px !important;
                padding-bottom: 140px !important;
            }

            body > div.fixed.bottom-0 {
                padding-top: 44px !important;
                padding-bottom: 10px !important;
            }
        }
    </style>
</head>

        const API_BASE = window.API_BASE_URL || (window.location.protocol === 'file:' ? 'http://127.0.0.1:8000' : '');

        // Flashlight effect tracking
        function handleMouseMove(e, element) {
            const rect = element.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            element.style.setProperty("--mouse-x", `${x}px`);
            element.style.setProperty("--mouse-y", `${y}px`);
        }

        // Auto-resize textarea
        chatInput.addEventListener('input', function () {
            this.style.height = '48px';
            this.style.height = (this.scrollHeight) + 'px';
            if (this.value.trim().length > 0) {
                sendBtn.classList.replace('bg-slate-700', 'bg-brand-600');
                sendBtn.classList.replace('text-slate-300', 'text-white');
                sendBtn.classList.replace('border-slate-600', 'border-brand-500');
            } else {
                sendBtn.classList.replace('bg-brand-600', 'bg-slate-700');

        // Handle Enter key
        function handleEnter(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                chatForm.dispatchEvent(new Event('submit'));

        // Send suggestion click
        window.sendSuggestion = function (element) {
            const text = element.querySelector('.suggestion-text').innerText;
            chatInput.value = text.trim();
            chatInput.style.height = '48px';
            chatInput.dispatchEvent(new Event('input')); // trigger button style
            chatForm.dispatchEvent(new Event('submit'));
        }

        function setupSuggestionCarousel() {
            const track = document.getElementById('suggestion-carousel-track');
            const prevBtn = document.getElementById('suggestion-prev');
            const nextBtn = document.getElementById('suggestion-next');
            const dotsWrap = document.getElementById('suggestion-carousel-dots');
            if (!track || !prevBtn || !nextBtn || !dotsWrap) return;

            const cards = Array.from(track.querySelectorAll('.suggestion-card'));
            if (cards.length === 0) return;

            let activeIndex = 0;
            let scrollFrame = null;

            dotsWrap.innerHTML = '';
            const dots = cards.map((_, index) => {
                const dot = document.createElement('button');
                dot.type = 'button';
                dot.className = 'suggestion-dot';
                dot.setAttribute('aria-label', `Sugestão ${index + 1}`);
                dot.addEventListener('click', () => {
                    cards[index].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'start' });
                });
                dotsWrap.appendChild(dot);
                return dot;
            });

            const getClosestIndex = () => {
                const trackLeft = track.getBoundingClientRect().left;
                return cards.reduce((closestIndex, card, index) => {
                    const closestDistance = Math.abs(cards[closestIndex].getBoundingClientRect().left - trackLeft);
                    const currentDistance = Math.abs(card.getBoundingClientRect().left - trackLeft);
                    return currentDistance < closestDistance ? index : closestIndex;
                }, 0);
            };

            const updateState = () => {
                activeIndex = getClosestIndex();
                dots.forEach((dot, index) => dot.classList.toggle('active', index === activeIndex));
                prevBtn.disabled = activeIndex === 0;
                nextBtn.disabled = activeIndex === cards.length - 1;
                prevBtn.classList.toggle('opacity-40', prevBtn.disabled);
                nextBtn.classList.toggle('opacity-40', nextBtn.disabled);
            };

            const moveTo = (index) => {
                const nextIndex = Math.max(0, Math.min(cards.length - 1, index));
                cards[nextIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'start' });
            };

            prevBtn.addEventListener('click', () => moveTo(activeIndex - 1));
            nextBtn.addEventListener('click', () => moveTo(activeIndex + 1));
            track.addEventListener('scroll', () => {
                if (scrollFrame) cancelAnimationFrame(scrollFrame);
                scrollFrame = requestAnimationFrame(updateState);
            }, { passive: true });
            window.addEventListener('resize', updateState);

            updateState();
        }

        function scrollToBottom() {
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function compactNumber(value) {
            const number = Number(value);
            if (!Number.isFinite(number)) return value;
            const abs = Math.abs(number);
            if (abs >= 1000000) return `${(number / 1000000).toLocaleString('pt-BR', { maximumFractionDigits: 1 })} mi`;
            if (abs >= 1000) return `${(number / 1000).toLocaleString('pt-BR', { maximumFractionDigits: 0 })} mil`;
            return number.toLocaleString('pt-BR');
        }

        function truncateLabel(value, maxLength = 24) {
            const text = String(value ?? '');
            return text.length > maxLength ? `${text.slice(0, maxLength - 1)}…` : text;
        }

        function removeRepeatedResponseBlocks(text) {
            let cleaned = text.trim();
            const normalized = (value) => value.replace(/\s+/g, ' ').trim();

            for (let cut = Math.floor(cleaned.length / 2) - 80; cut <= Math.floor(cleaned.length / 2) + 80; cut++) {
                if (cut <= 0 || cut >= cleaned.length) continue;
                const first = cleaned.slice(0, cut).trim();
                const second = cleaned.slice(cut).trim();
                if (first.length > 180 && normalized(first) === normalized(second)) {
                    cleaned = first;
                    break;
                }
            }

            const blocks = cleaned.split(/\n{2,}/);
            const seen = new Set();
            return blocks.filter((block) => {
                const key = normalized(block);
                if (key.length < 120) return true;
                if (seen.has(key)) return false;
                seen.add(key);
                return true;
            }).join('\n\n');
        }

        function findJsonArrayEnd(text, startIndex) {
            let depth = 0;
            let inString = false;
            let escaped = false;

            for (let i = startIndex; i < text.length; i++) {
                const char = text[i];

                if (inString) {
                    if (escaped) {
                        escaped = false;
                    } else if (char === '\\') {
                        escaped = true;
                    } else if (char === '"') {
                        inString = false;
                    }
                    continue;
                }

                if (char === '"') {
                    inString = true;
                } else if (char === '[') {
                    depth++;
                } else if (char === ']') {
                    depth--;
                    if (depth === 0) return i;
                }
            }

            return -1;
        }

        function extractChartBlocks(text) {
            const charts = [];
            const markerRegex = /\[(BAR|LINE|PIE)\]\s*->\s*/g;
            let output = '';
            let cursor = 0;
            let match;

            while ((match = markerRegex.exec(text)) !== null) {
                let jsonStart = markerRegex.lastIndex;
                while (/\s/.test(text[jsonStart])) jsonStart++;
                if (text[jsonStart] !== '[') continue;

                const jsonEnd = findJsonArrayEnd(text, jsonStart);
                if (jsonEnd === -1) continue;

                const rawJson = text.slice(jsonStart, jsonEnd + 1);
                const chartId = `chart-${Math.random().toString(36).slice(2, 11)}`;

                try {
                    const data = JSON.parse(rawJson);
                    if (!Array.isArray(data) || data.length === 0) throw new Error('empty chart data');

                    output += text.slice(cursor, match.index);
                    output += `<div class="aibi-chart-shell"><div id="${chartId}" class="aibi-chart-canvas"></div></div>`;
                    charts.push({ id: chartId, type: match[1], data });
                    cursor = jsonEnd + 1;
                    markerRegex.lastIndex = cursor;
                } catch (error) {
                    console.error('Failed to parse chart JSON:', error);
                }
            }

            output += text.slice(cursor);
            return { text: output, charts };
        }

        function renderAiChart({ id, type, data }) {
            const chartEl = document.getElementById(id);
            if (!chartEl || !window.ApexCharts) return;

            const normalizedData = data
                .map((item) => ({
                    x: item.x ?? item.label ?? item.name ?? '',
                    y: Number(item.y ?? item.value ?? item.total ?? 0)
                }))
                .filter((item) => item.x !== '' && Number.isFinite(item.y));

            if (normalizedData.length === 0) return;

            const isMobile = window.matchMedia('(max-width: 640px)').matches;
            const categories = normalizedData.map((item) => String(item.x));
            const seriesData = normalizedData.map((item) => item.y);
            const apexType = type === 'LINE' ? 'line' : type === 'PIE' ? 'pie' : 'bar';
            const chartHeight = apexType === 'bar'
                ? Math.max(isMobile ? 320 : 320, normalizedData.length * (isMobile ? 58 : 54) + 96)
                : 320;
            const chartWidth = apexType === 'bar'
                ? Math.max(isMobile ? 760 : 720, 420 + Math.max(...categories.map(label => label.length)) * (isMobile ? 7 : 6))
                : Math.max(isMobile ? 520 : 620, 120 * normalizedData.length);

            chartEl.style.height = `${chartHeight}px`;
            chartEl.style.width = `${chartWidth}px`;
            chartEl.style.minWidth = `${chartWidth}px`;

            const options = {
                series: apexType === 'pie' ? seriesData : [{ name: 'Valor', data: seriesData }],
                chart: {
                    type: apexType,
                    height: chartHeight,
                    width: chartWidth,
                    foreColor: '#94a3b8',
                    toolbar: { show: false },
                    fontFamily: 'inherit',
                    background: 'transparent',
                    redrawOnParentResize: true,
                    redrawOnWindowResize: true
                },
                colors: ['#3b82f6', '#8b5cf6', '#ec4899', '#f43f5e', '#f59e0b', '#14b8a6', '#eab308'],
                plotOptions: {
                    bar: {
                        borderRadius: 6,
                        horizontal: true,
                        barHeight: isMobile ? '46%' : '58%',
                        dataLabels: { position: 'center' }
                    }
                },
                dataLabels: {
                    enabled: apexType !== 'line',
                    textAnchor: 'middle',
                    offsetX: 0,
                    style: {
                        colors: ['#ffffff'],
                        fontSize: isMobile ? '11px' : '12px',
                        fontFamily: 'inherit',
                        fontWeight: 800,
                    },
                    formatter: function (val) {
                        const maxVal = Math.max(...seriesData);
                        if (apexType === 'bar' && val < maxVal * 0.12) return '';
                        return compactNumber(val);
                    },
                    dropShadow: {
                        enabled: true,
                        top: 1,
                        left: 1,
                        blur: 2,
                        opacity: 0.75
                    }
                },
                fill: {
                    type: 'gradient',
                    gradient: {
                        shade: 'dark',
                        type: 'horizontal',
                        shadeIntensity: 0.6,
                        gradientToColors: ['#60a5fa', '#a78bfa', '#f472b6', '#fb7185', '#fbbf24', '#2dd4bf', '#fde047'],
                        inverseColors: false,
                        opacityFrom: 1,
                        opacityTo: 1,
                        stops: [0, 100]
                    }
                },
                stroke: {
                    show: true,
                    width: apexType === 'line' ? 3 : 1,
                    curve: 'smooth',
                    colors: apexType === 'line' ? ['#60a5fa'] : ['#2563eb', '#7c3aed', '#db2777', '#e11d48', '#d97706']
                },
                xaxis: {
                    categories: apexType === 'pie' ? [] : categories,
                    tickAmount: isMobile ? 3 : 5,
                    labels: {
                        rotate: 0,
                        trim: true,
                        hideOverlappingLabels: true,
                        style: { colors: '#94a3b8', fontSize: isMobile ? '10px' : '11px' },
                        formatter: function (val) {
                            return typeof val === 'number' ? compactNumber(val) : val;
                        }
                    }
                },
                yaxis: {
                    labels: {
                        maxWidth: isMobile ? 116 : 180,
                        style: { colors: '#94a3b8', fontSize: isMobile ? '10px' : '11px' },
                        formatter: function (val) {
                            return truncateLabel(val, isMobile ? 18 : 28);
                        }
                    }
                },
                labels: apexType === 'pie' ? categories : [],
                legend: {
                    position: 'bottom',
                    fontSize: '11px',
                    labels: { colors: '#cbd5e1' }
                },
                grid: {
                    borderColor: '#334155',
                    strokeDashArray: 4,
                    padding: {
                        left: isMobile ? 0 : 8,
                        right: isMobile ? 8 : 14,
                        bottom: 4
                    }
                },
                theme: { mode: 'dark' },
                tooltip: {
                    theme: 'dark',
                    y: {
                        formatter: (val) => new Intl.NumberFormat('pt-BR').format(val)
                    }
                }
            };

            const chart = new ApexCharts(chartEl, options);
            chart.render().then(() => {
                enableChartDragScroll(chartEl.closest('.aibi-chart-shell'));
            });
        }

        function enableChartDragScroll(shell) {
            if (!shell || shell.dataset.dragScrollReady === 'true') return;
            shell.dataset.dragScrollReady = 'true';

            let isDragging = false;
            let hasMoved = false;
            let startX = 0;
            let startY = 0;
            let startLeft = 0;
            let startTop = 0;

            shell.addEventListener('pointerdown', (event) => {
                if (event.pointerType === 'mouse' && event.button !== 0) return;
                isDragging = true;
                hasMoved = false;
                startX = event.clientX;
                startY = event.clientY;
                startLeft = shell.scrollLeft;
                startTop = shell.scrollTop;
                shell.classList.add('is-dragging');
                shell.setPointerCapture(event.pointerId);
            });

            shell.addEventListener('pointermove', (event) => {
                if (!isDragging) return;

                const deltaX = event.clientX - startX;
                const deltaY = event.clientY - startY;

                if (Math.abs(deltaX) > 4 || Math.abs(deltaY) > 4) {
                    hasMoved = true;
                    event.preventDefault();
                }

                shell.scrollLeft = startLeft - deltaX;
                shell.scrollTop = startTop - deltaY;
            }, { passive: false });

            const stopDragging = (event) => {
                if (!isDragging) return;
                isDragging = false;
                shell.classList.remove('is-dragging');
                if (shell.hasPointerCapture(event.pointerId)) {
                    shell.releasePointerCapture(event.pointerId);
                }

                if (hasMoved) {
                    shell.dataset.preventNextClick = 'true';
                    setTimeout(() => {
                        shell.dataset.preventNextClick = 'false';
                    }, 0);
                }
            };

            shell.addEventListener('pointerup', stopDragging);
            shell.addEventListener('pointercancel', stopDragging);
            shell.addEventListener('click', (event) => {
                if (shell.dataset.preventNextClick === 'true') {
                    event.preventDefault();
                    event.stopPropagation();
                }
            }, true);
        }

                            <iconify-icon icon="ph:robot-duotone" class="text-brand-400 text-lg"></iconify-icon>
                        </div>
                        <div class="flex-1 flashlight-card border border-slate-700/50 bg-slate-800/40 px-6 py-1 rounded-2xl rounded-tl-sm shadow-md" onmousemove="handleMouseMove(event, this)">
                            <div class="relative z-10 text-slate-200 text-sm md:text-base font-light overflow-hidden markdown-body stagger-message">
                                ${content}
                            </div>
                        </div>
                    </div>
                `;
            }
            return div;
        }

        function createLoadingElement() {
            const div = document.createElement('div');
            div.className = `flex w-full justify-start reveal`;
            div.id = 'loading-indicator';

            div.innerHTML = `
                <div class="flex gap-4 w-full max-w-4xl group">
                    <div class="relative w-10 h-10 shrink-0 mt-1">
                        <div class="absolute inset-0 rounded-xl bg-[conic-gradient(from_0deg,transparent_0_340deg,rgba(59,130,246,1)_360deg)] animate-[spin_2s_linear_infinite] opacity-60 blur-[2px]"></div>
                        <div class="absolute inset-[1px] rounded-[11px] bg-slate-900 flex items-center justify-center z-10 shadow-[inset_0_0_10px_rgba(59,130,246,0.1)]">
                            <iconify-icon icon="ph:robot-duotone" class="text-brand-400 text-lg animate-pulse-slow"></iconify-icon>
                        </div>
                    </div>
                    <div class="flex-1 flashlight-card border border-slate-700/50 bg-slate-800/40 px-6 py-3 rounded-2xl rounded-tl-sm shadow-md flex items-center gap-4">
                        <div class="flex gap-1.5 shrink-0">
                            <div class="typing-dot"></div>
                            <div class="typing-dot"></div>
                            <div class="typing-dot"></div>
                        </div>
                        <div class="h-4 border-l border-slate-600/50 shrink-0"></div>
                        <span id="loading-text" class="text-sm font-medium text-transparent bg-clip-text bg-gradient-to-r from-brand-400 to-slate-300 transition-opacity duration-500 opacity-100">Iniciando análise estratégica...</span>
                    </div>
                </div>
            `;
            return div;
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (isProcessing) return;

            const text = chatInput.value.trim();
            if (!text) return;

            isProcessing = true;
            chatInput.value = '';
            chatInput.style.height = '48px';
            chatInput.disabled = true;
            sendBtn.disabled = true;

            if (welcomeScreen && welcomeScreen.style.display !== 'none') {
                welcomeScreen.classList.add('welcome-leave');
                setTimeout(() => {
                    welcomeScreen.style.display = 'none';
                }, 600);
            }

            const userMsgEl = createMessageElement(text, true);
            chatContainer.appendChild(userMsgEl);
            setTimeout(() => userMsgEl.classList.add('active'), 50);
            scrollToBottom();

            const loadingEl = createLoadingElement();
            chatContainer.appendChild(loadingEl);
            setTimeout(() => loadingEl.classList.add('active'), 50);
            scrollToBottom();

            // Setup loading phrases animation
            const loadingText = loadingEl.querySelector('#loading-text');
            const phrases = [
                "Lendo o banco de dados da ANS...",
                "Cruzando métricas de operadoras...",
                "Analisando market share...",
                "Gerando os melhores insights...",
                "Preparando resposta estratégica..."
            ];
            let phraseIndex = 0;
            const phraseInterval = setInterval(() => {
                loadingText.style.opacity = '0';
                setTimeout(() => {
                    phraseIndex = (phraseIndex + 1) % phrases.length;
                    loadingText.innerText = phrases[phraseIndex];
                    loadingText.style.opacity = '1';
                }, 500);
            }, 2500);

            try {
                const response = await fetch(`${API_BASE}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pergunta: text })
                });

                if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);

                const data = await response.json();
                let cleanResp = removeRepeatedResponseBlocks((data.resposta || "").trim().replace(/^[\r\n]+/, ''));
                const chartExtraction = extractChartBlocks(cleanResp);
                cleanResp = chartExtraction.text;

                let mdHtml = marked.parse(cleanResp);
                
                // Remove empty paragraphs even if they contain <br> or spaces
                mdHtml = mdHtml.replace(/<p[^>]*>(\s*|<br\s*\/?>\s*)*<\/p>/g, '');

                loadingEl.remove();

                const aiMsgEl = createMessageElement(mdHtml, false);
                chatContainer.appendChild(aiMsgEl);
                setTimeout(() => aiMsgEl.classList.add('active'), 50);

                chartExtraction.charts.forEach(renderAiChart);

                // Render chart if data exists
                if (false && chartData && document.getElementById(chartId)) {
                    const categories = chartData.map(d => d.x);
                    const seriesData = chartData.map(d => d.y);
                    
                    let apexType = 'bar';
                    if (chartType === 'LINE') apexType = 'line';
                    if (chartType === 'PIE') apexType = 'pie';

                    const options = {
                        series: apexType === 'pie' ? seriesData : [{ name: 'Valor', data: seriesData }],
                        chart: {
                            type: apexType,
                            height: 300,
                            foreColor: '#94a3b8',
                            toolbar: { show: false },
                            fontFamily: 'inherit',
                            background: 'transparent'
                        },
                        colors: ['#3b82f6', '#8b5cf6', '#ec4899', '#f43f5e', '#f59e0b'],
                        plotOptions: {
                            bar: {
                                borderRadius: 6,
                                horizontal: true,
                                barHeight: '60%',
                                dataLabels: {
                                    position: 'top'
                                }
                            }
                        },
                        dataLabels: {
                            enabled: true,
                            textAnchor: 'end',
                            offsetX: -8,
                            style: {
                                colors: ['#ffffff'],
                                fontSize: '12px',
                                fontFamily: 'inherit',
                                fontWeight: 700,
                            },
                            formatter: function (val) {
                                // Smart logic: se a barra for muito pequena (< 15% do max), esconde o label para não vazar pra esquerda
                                const maxVal = Math.max(...seriesData);
                                if (val < maxVal * 0.15) return '';
                                return new Intl.NumberFormat('pt-BR').format(val);
                            },
                            dropShadow: {
                                enabled: true,
                                top: 1,
                                left: 1,
                                blur: 2,
                                opacity: 0.8
                            }
                        },
                        fill: {
                            type: 'gradient',
                            gradient: {
                                shade: 'dark',
                                type: 'horizontal',
                                shadeIntensity: 0.6,
                                gradientToColors: ['#60a5fa', '#a78bfa', '#f472b6', '#fb7185', '#fbbf24'],
                                inverseColors: false,
                                opacityFrom: 1,
                                opacityTo: 1,
                                stops: [0, 100]
                            }
                        },
                        stroke: {
                            show: true,
                            width: 1,
                            colors: ['#2563eb', '#7c3aed', '#db2777', '#e11d48', '#d97706']
                        },
                        xaxis: {
                            categories: apexType === 'pie' ? [] : categories,
                            labels: {
                                style: { colors: '#94a3b8' },
                                formatter: function(val) {
                                    if (typeof val === 'number') {
                                        return new Intl.NumberFormat('pt-BR').format(val);
                                    }
                                    return val;
                                }
                            }
                        },
                        labels: apexType === 'pie' ? categories : [],
                        grid: {
                            borderColor: '#334155',
                            strokeDashArray: 4,
                        },
                        theme: { mode: 'dark' },
                        tooltip: {
                            theme: 'dark'
                        }
                    };

                    const chart = new ApexCharts(document.getElementById(chartId), options);
                    chart.render();
                }

            } catch (error) {
                console.error("Chat Error:", error);
                loadingEl.remove();
                const errorEl = createMessageElement(`<p class="text-wine-400 font-medium">Erro ao comunicar com o núcleo estratégico. Verifique a conexão.</p>`, false);
                chatContainer.appendChild(errorEl);
                setTimeout(() => errorEl.classList.add('active'), 50);
            } finally {
                clearInterval(phraseInterval);
                isProcessing = false;
                chatInput.disabled = false;
                sendBtn.disabled = false;
                chatInput.focus();
                scrollToBottom();
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            setupSuggestionCarousel();
            setTimeout(() => {
                document.querySelectorAll('.reveal').forEach((el, index) => {
                    setTimeout(() => el.classList.add('active'), index * 100);
                });
            }, 100);
        });
    </script>
</body>

</html>
